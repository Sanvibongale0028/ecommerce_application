spring:
  application:
    name: ecommerce
  datasource:
    url: "${DB_URL}"
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
      format_sql: true
    show-sql: true

server:
  port: 8080

jwt:
  secret: "${JWT_SECRET}"
  expiration: 86400000